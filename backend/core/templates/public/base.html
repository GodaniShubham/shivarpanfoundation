<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>
      {% block title %}{{ site_settings.default_meta_title|default:"Shivarpan Foundation" }}{% endblock %}
    </title>

    <meta name="description" content="{% block meta_description %}{{ site_settings.default_meta_description }}{% endblock %}" />

    {% block meta_extra %}{% endblock %}

    <style>
      :root { --bg:#0b1220; --card:#fff; --muted:#6b7280; --border:#e5e7eb; --brand:#2563eb; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0; color: #111; background:#fafafa; }
      a { color: inherit; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 22px; }
      .topbar { background: #0b1220; color: #fff; position: sticky; top: 0; z-index: 10; }
      .topbar .wrap { display:flex; align-items:center; justify-content:space-between; gap: 18px; }
      .brand { font-weight: 800; letter-spacing: 0.2px; text-decoration:none; }
      .nav { display:flex; gap: 12px; flex-wrap: wrap; align-items:center; }
      .nav a { color: rgba(255,255,255,0.92); text-decoration:none; padding: 8px 10px; border-radius: 10px; }
      .nav a:hover { background: rgba(255,255,255,0.10); }
      .cta { display:inline-block; padding: 12px 16px; background: var(--brand); color: #fff; text-decoration:none; border-radius: 10px; }
      .muted { color: var(--muted); }
      .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
      .card { border: 1px solid var(--border); border-radius: 14px; padding: 16px; background: var(--card); }
      img { max-width: 100%; height: auto; border-radius: 12px; }
      .pill { display:inline-block; font-size: 12px; padding: 4px 10px; border:1px solid var(--border); border-radius: 999px; background:#fff; color:#111; margin-right:6px; }
      .footer { padding: 28px 0; color: var(--muted); }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="wrap">
        <a class="brand" href="/">Shivarpan Foundation</a>
        <nav class="nav">
          <a href="/blog/">Blog</a>
          <a href="/projects/">Projects</a>
          <a href="/magazine/">Magazine</a>
          <a href="/testimonials/">Testimonials</a>
          {% for p in nav_pages %}
            <a href="/{{ p.slug }}/">{{ p.menu_title|default:p.title }}</a>
          {% endfor %}
        </nav>
      </div>
    </header>

    {% block content %}{% endblock %}

    <footer class="footer">
      <div class="wrap">
        <div>Admin: <a href="/admin/">/admin/</a> · API: <a href="/api/">/api/</a></div>
      </div>
    </footer>
  </body>
</html>
