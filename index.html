<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https: http:;
      connect-src 'self' https://api.github.com https://shivarpan-foundation-backend.onrender.com;
      media-src 'self' https:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      upgrade-insecure-requests;
    ">
    
    <title>Shivarpan Foundation</title>
    <meta
      name="description"
      content="Empowering communities through education, healthcare, food security, and environmental sustainability."
    >
    <meta name="author" content="Shivarpan Foundation" />
    <link rel="icon" type="image/png" href="/shivarpan-logo-transparent.png" />
    <link rel="apple-touch-icon" href="/shivarpan-logo-transparent.png" />

    <meta property="og:type" content="website" />
    <meta property="og:image" content="/shivarpan-logo-transparent.png">
    <meta property="og:title" content="Shivarpan Foundation">
    <meta
      property="og:description"
      content="Empowering communities through education, healthcare, food security, and environmental sustainability."
    >

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/shivarpan-logo-transparent.png">
    <meta name="twitter:title" content="Shivarpan Foundation">
    <meta
      name="twitter:description"
      content="Empowering communities through education, healthcare, food security, and environmental sustainability."
    >
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
