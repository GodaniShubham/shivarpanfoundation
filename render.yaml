services:
  - type: web
    name: shivarpan-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    plan: free
    disk:
      name: shivarpan-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: shivarpan-backend.onrender.com
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://shivarpan-frontend.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://shivarpan-frontend.onrender.com
      - key: DJANGO_DB_PATH
        value: /var/data/db.sqlite3
      - key: DJANGO_MEDIA_ROOT
        value: /var/data/media

  - type: web
    name: shivarpan-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://shivarpan-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
